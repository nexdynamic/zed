name: Release Nexdynamic

on:
  push:
    branches: [nexdynamic]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set release channel
        run: echo nexdynamic > crates/zed/RELEASE_CHANNEL

      - name: Bundle
        run: script/bundle-mac

      - name: Rename DMG by arch
        run: |
          ARCH=$(uname -m)
          mv "Zed Nexdynamic.dmg" "Zed-Nexdynamic-${ARCH}.dmg"

      - name: Create or update rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nexdynamic-latest
          name: Nexdynamic (latest)
          prerelease: true
          files: Zed-Nexdynamic-*.dmg
