name: Sync Upstream

on:
  schedule:
    - cron: '0 * * * *'  # check hourly
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Check for new upstream release
        id: check
        run: |
          UPSTREAM_TAG=$(curl -s https://api.github.com/repos/zed-industries/zed/releases/latest | jq -r '.tag_name')
          LOCAL_TAG=$(git tag --sort=-version:refname | grep '^v' | grep -v 'nex' | head -1)
          echo "upstream=$UPSTREAM_TAG" >> $GITHUB_OUTPUT
          echo "local=$LOCAL_TAG" >> $GITHUB_OUTPUT
          if [ "$UPSTREAM_TAG" = "$LOCAL_TAG" ]; then
            echo "new=false" >> $GITHUB_OUTPUT
          else
            echo "new=true" >> $GITHUB_OUTPUT
          fi

      - name: Reset main to upstream tag
        if: steps.check.outputs.new == 'true'
        run: |
          UPSTREAM_TAG="${{ steps.check.outputs.upstream }}"
          echo "Resetting main to ${UPSTREAM_TAG} (was ${{ steps.check.outputs.local }})"
          git remote add upstream https://github.com/zed-industries/zed.git
          git fetch upstream tag "${UPSTREAM_TAG}" --no-tags
          git reset --hard "${UPSTREAM_TAG}"
          git push origin main --force-with-lease

      - name: Trigger merge workflow
        if: steps.check.outputs.new == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: gh workflow run merge-to-nexdynamic.yml
